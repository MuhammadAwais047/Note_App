    <text x="34" y="697" font-family="Nunito, sans-serif" font-size="25" font-weight="400" fill="#000">Awesome tweets collection</text>
    <text x="34" y="766" font-family="Nunito, sans-serif" font-size="12" fill="#000" opacity="0.5">5 days ago</text>
  </g>
  <!-- FAB -->
  <g filter="url(#fabShadow)">
    <circle cx="374" cy="830" r="35" fill="#3b3b3b"/>
    <line x1="361" y1="830" x2="387" y2="830" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
    <line x1="374" y1="817" x2="374" y2="843" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
