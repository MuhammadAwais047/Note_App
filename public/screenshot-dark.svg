    <text x="34" y="200" font-family="Nunito, sans-serif" font-size="12" fill="#000" opacity="0.5">Today, 10:30 AM</text>
  </g>
  <!-- Card 2 - Salmon -->
  <g filter="url(#shadow)">
    <rect x="16" y="229" width="382" height="157" rx="12" fill="#ffb08e"/>
    <rect x="16" y="229" width="382" height="157" rx="12" fill="url(#grad)"/>
    <text x="34" y="265" font-family="Nunito, sans-serif" font-size="25" font-weight="400" fill="#000">Book Review: The Design of</text>
    <text x="34" y="295" font-family="Nunito, sans-serif" font-size="25" font-weight="400" fill="#000">Everyday Things by Don Norman</text>
    <text x="34" y="370" font-family="Nunito, sans-serif" font-size="12" fill="#000" opacity="0.5">Yesterday</text>
