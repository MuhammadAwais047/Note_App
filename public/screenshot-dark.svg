    </filter>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.1)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>
  <rect width="414" height="896" fill="#252525" rx="30"/>
  <rect x="30" y="12" width="180" height="12" rx="6" fill="#fff" opacity="0.3"/>
  <rect x="340" y="14" width="50" height="8" rx="4" fill="#fff" opacity="0.3"/>
  <text x="20" y="72" font-family="Nunito, sans-serif" font-size="43" font-weight="600" fill="#fff">Notes</text>
  <rect x="324" y="40" width="50" height="50" rx="15" fill="#3b3b3b"/>
  <circle cx="344" cy="60" r="8" stroke="#fff" stroke-width="2" fill="none"/>
  <line x1="350" y1="66" x2="356" y2="72" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
  <rect x="270" y="40" width="50" height="50" rx="15" fill="#3b3b3b"/>
  <circle cx="295" cy="65" r="4.5" stroke="#fff" stroke-width="1.5" fill="none"/>
  <path d="M285 60a4.5 4.5 0 0 1 0 9 4.5 4.5 0 0 1-4.5-4.5 4.5 4.5 0 0 1 4.5-4.5z" fill="#fff" opacity="0.8"/>
  <line x1="282" y1="57" x2="284" y2="59" stroke="#fff" stroke-width="1" stroke-linecap="round"/>
  <line x1="308" y1="57" x2="306" y2="59" stroke="#fff" stroke-width="1" stroke-linecap="round"/>
  <line x1="295" y1="52" x2="295" y2="54" stroke="#fff" stroke-width="1" stroke-linecap="round"/>
  <line x1="295" y1="78" x2="295" y2="76" stroke="#fff" stroke-width="1" stroke-linecap="round"/>
  <line x1="282" y1="73" x2="284" y2="71" stroke="#fff" stroke-width="1" stroke-linecap="round"/>
  <line x1="308" y1="73" x2="306" y2="71" stroke="#fff" stroke-width="1" stroke-linecap="round"/>
  <!-- Card 1 - Pink -->
  <g filter="url(#shadow)">
    <rect x="16" y="105" width="382" height="110" rx="12" fill="#ff9e9e"/>
    <rect x="16" y="105" width="382" height="110" rx="12" fill="url(#grad)"/>
